<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Отчёт «Безопасное вождение» — NL-сценарий</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
      colors: {
        navy: { 700: '#1E40AF', 800: '#1E3A8A', 900: '#172554' },
      },
      boxShadow: {
        'soft': '0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06)',
        'pop': '0 10px 25px -5px rgba(15,23,42,.18), 0 6px 12px -8px rgba(15,23,42,.10)',
        'xl2': '0 25px 50px -12px rgba(15,23,42,.28)',
      },
    },
  },
};
</script>
<style>
  html, body { background:#E2E8F0; font-family:'Inter',system-ui,sans-serif; color:#0F172A; }
  body { margin:0; }
  .screen { width:1440px; height:900px; background:#F8FAFC; box-shadow:0 30px 60px -20px rgba(15,23,42,.25), 0 8px 20px -10px rgba(15,23,42,.18); border-radius:6px; overflow:hidden; position:relative; }
  .screens-wrap { display:flex; flex-direction:column; align-items:center; gap:64px; padding:64px 32px 96px; }
  .frame-label { font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#64748B; font-weight:600; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .frame-label .dot { width:6px; height:6px; border-radius:999px; background:#1E3A8A; }
  /* hide scrollbars inside left column */
  .no-scrollbar::-webkit-scrollbar { width:0; height:0; }
  .no-scrollbar { scrollbar-width:none; }
  /* subtle row hover */
  .row { transition: background .12s ease; }
  .row:hover { background:#F1F5F9; }
  .preset:hover { background:#EFF6FF; border-color:#1E3A8A; color:#1E3A8A; }
  .ghost-btn:hover { background:#F1F5F9; }
  .primary-btn { background:#1E3A8A; }
  .primary-btn:hover { background:#1E40AF; }
  /* video play pulse */
  @keyframes pulse-soft { 0%,100%{opacity:.85} 50%{opacity:.55} }
  .pulse { animation: pulse-soft 1.6s ease-in-out infinite; }
  @keyframes pulseRing { 0%{transform:scale(.6); opacity:.55} 80%,100%{transform:scale(2.4); opacity:0} }
  .pulse-ring { animation: pulseRing 1.4s ease-out infinite; }
  @keyframes pulseDot { 0%,100%{transform:scale(1); opacity:1} 50%{transform:scale(.85); opacity:.7} }
  .pulse-dot { animation: pulseDot 1.4s ease-in-out infinite; }
  @keyframes caret { 0%,50%{opacity:1} 51%,100%{opacity:0} }
  @keyframes waveAnim { 0%{height:2px} 100%{height:16px} }
  .wave-bar { height:4px; min-height:2px; }
  /* table cell vertical alignment */
  td, th { vertical-align:middle; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;

/* ─────────────────────────────  ICONS  ───────────────────────────── */
const I = {
  map:    (p={}) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2Z"/><path d="M9 4v14M15 6v14"/></svg>,
  bell:   (p={}) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9Z"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>,
  inbox:  (p={}) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 13h5l2 3h4l2-3h5"/><path d="M5 4h14l2 9v7H3v-7l2-9Z"/></svg>,
  chart:  (p={}) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>,
  gear:   (p={}) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.6 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/></svg>,
  send:   (p={}) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="m22 2-7 20-4-9-9-4 20-7Z"/><path d="M22 2 11 13"/></svg>,
  download:(p={}) => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>,
  edit:   (p={}) => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"/></svg>,
  user:   (p={}) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>,
  cal:    (p={}) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></svg>,
  truck:  (p={}) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="1" y="6" width="14" height="11" rx="1"/><path d="M15 9h4l3 4v4h-7"/><circle cx="6" cy="19" r="2"/><circle cx="18" cy="19" r="2"/></svg>,
  ruler:  (p={}) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="2" y="9" width="20" height="7" rx="1" transform="rotate(-12 12 12)"/><path d="M6 11v2M9 10.5v3M12 10v3M15 9.5v3M18 9v3"/></svg>,
  route:  (p={}) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="6" cy="19" r="3"/><circle cx="18" cy="5" r="3"/><path d="M6 16V8a4 4 0 0 1 8 0v8a4 4 0 0 0 8 0V8"/></svg>,
  clock:  (p={}) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
  bot:    (p={}) => <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1E3A8A" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="4" y="7" width="16" height="12" rx="3" fill="#EFF6FF"/><circle cx="9" cy="13" r="1.2" fill="#1E3A8A"/><circle cx="15" cy="13" r="1.2" fill="#1E3A8A"/><path d="M12 4v3M8 19v2M16 19v2"/></svg>,
  doc:    (p={}) => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Z"/><path d="M14 2v6h6"/><path d="M8 13h2v5H8zM12 11h2v7h-2zM16 15h2v3h-2z" fill="#CBD5E1" stroke="none"/></svg>,
  play:   (p={}) => <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M8 5v14l11-7L8 5Z"/></svg>,
  pause:  (p={}) => <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>,
  full:   (p={}) => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 9V3h6M21 9V3h-6M3 15v6h6M21 15v6h-6"/></svg>,
  mic:    (p={}) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v4M8 22h8"/></svg>,
  stop:   (p={}) => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" {...p}><rect x="6" y="6" width="12" height="12" rx="2"/></svg>,
  sparkle:(p={}) => <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" {...p}><path d="m12 2 2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4L12 2Z"/></svg>,
  check:  (p={}) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="m5 12 5 5L20 7"/></svg>,
  arrowR: (p={}) => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12h14M13 5l7 7-7 7"/></svg>,
  warn:   (p={}) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M10.3 3.86 1.82 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.86a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4M12 17h.01"/></svg>,
  camera: (p={}) => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M23 7 16 12l7 5V7Z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>,
  signal: (p={}) => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M2 12a10 10 0 0 1 20 0M6 12a6 6 0 0 1 12 0M10 12a2 2 0 0 1 4 0"/></svg>,
};

/* ─────────────────────────────  CHROME  ───────────────────────────── */
function Sidebar({ active='reports' }) {
  const items = [
    { k:'map',     icon:I.map,   label:'Карта' },
    { k:'events',  icon:I.bell,  label:'События' },
    { k:'inbox',   icon:I.inbox, label:'Заявки' },
    { k:'reports', icon:I.chart, label:'Отчёты' },
  ];
  return (
    <div style={{width:48, background:'#1E3A8A'}} className="h-full flex flex-col items-center pt-3">
      <div className="w-7 h-7 rounded-md bg-white/15 grid place-items-center text-white font-bold text-[12px] mb-3">S</div>
      {items.map(it=>{
        const isActive = it.k === active;
        const Ico = it.icon;
        return (
          <div key={it.k} title={it.label}
               className="w-9 h-9 my-0.5 rounded-md grid place-items-center cursor-pointer"
               style={{background: isActive ? '#1E40AF' : 'transparent', color: isActive ? '#fff' : 'rgba(255,255,255,.65)'}}>
            <Ico/>
          </div>
        );
      })}
      <div className="mt-auto mb-3 w-9 h-9 rounded-md grid place-items-center text-white/65"><I.gear/></div>
    </div>
  );
}

function TopBar() {
  return (
    <div className="flex items-center px-6" style={{height:56, background:'#fff', borderBottom:'1px solid #E2E8F0'}}>
      <div className="text-[18px] font-bold text-slate-900">Диалог аналитики</div>
      <span className="ml-3 inline-flex items-center gap-1 text-[11px] font-semibold tracking-wide px-2 py-[3px] rounded-md"
            style={{background:'#EFF6FF', color:'#1E3A8A'}}>
        <span className="w-1.5 h-1.5 rounded-full" style={{background:'#1E3A8A'}}/>SKAI AI
      </span>
      <div className="ml-auto flex items-center gap-3 text-[13px] text-slate-500">
        <div className="px-2 py-1 rounded-md hover:bg-slate-100 cursor-pointer">История</div>
        <div className="w-8 h-8 rounded-full bg-slate-200 grid place-items-center text-slate-600 text-[12px] font-semibold">ДП</div>
      </div>
    </div>
  );
}

/* ─────────────────────────────  STATE A — EMPTY  ───────────────────────────── */
const PRESETS = [
  { e:'📊', t:'Нарушения Иванова за последние 3 дня' },
  { e:'📷', t:'Все нарушения по компании за 3 дня' },
  { e:'⚡', t:'Топ-5 нарушителей за май' },
  { e:'🔴', t:'Грубые нарушения за квартал' },
  { e:'📷', t:'Водители с видео-детекциями' },
  { e:'🌙', t:'Ночные поездки этой недели' },
  { e:'📋', t:'Сравнить двух водителей' },
];

/* Two mic states for the input block:
   - mode='typed'  : user typed text by keyboard, mic idle
   - mode='voice'  : voice recording, textarea passive */
function InputBlock({ mode }) {
  const isRec   = mode === 'voice';
  const isTyped = mode === 'typed';
  const typedText = 'Покажи нарушения по ВА и телематике у Иванова за последние три дня';

  // textarea visual state
  const taActive = isTyped;             // typed → blue focus ring on textarea
  const taBorder = taActive ? '2px solid #1E3A8A' : '1px solid #E2E8F0';
  const taBg     = isRec    ? '#F8FAFC' : '#fff';
  const taOpacity= isRec    ? .55       : 1;

  // mic button visual state
  const micBorder = isRec ? '2px solid #DC2626' : '1px solid #E2E8F0';
  const micBg     = isRec ? '#FEF2F2'           : '#fff';
  const micColor  = isRec ? '#DC2626'           : '#94A3B8';

  // submit
  const submitDisabled = isRec;
  const submitBg = submitDisabled ? '#CBD5E1' : '#1E3A8A';

  return (
    <div className="w-full relative">
      {/* Recording label row */}
      {isRec && (
        <div className="flex items-center justify-end mb-1.5">
          <span className="inline-flex items-center gap-1.5 text-[13px] italic font-semibold" style={{color:'#DC2626'}}>
            <span className="relative grid place-items-center" style={{width:10, height:10}}>
              <span className="absolute inset-0 rounded-full pulse-ring" style={{background:'#DC2626'}}/>
              <span style={{width:8, height:8, borderRadius:999, background:'#DC2626'}} className="pulse-dot"/>
            </span>
            Слушаю...
          </span>
        </div>
      )}

      {/* Textarea */}
      <div className="relative">
        <textarea
          rows={3}
          readOnly
          value={isTyped ? typedText : ''}
          placeholder={isRec
            ? 'Говорите — речь появится здесь...'
            : 'Например: «Покажи нарушения по ВА и телематике у Иванова за последние три дня»\nили «Все засыпания за май по подразделению Север-1»'}
          className="w-full text-[14px] outline-none resize-none text-slate-900 text-left"
          style={{border:taBorder, borderRadius:8, background:taBg, padding:14, lineHeight:'1.55', minHeight:96, opacity:taOpacity, transition:'all .2s ease'}}
        />
        {/* fake caret on typed mode */}
        {isTyped && (
          <span aria-hidden="true" style={{
            position:'absolute',
            // place caret at end of typed line — approximate
            left: 'calc(14px + 67ch)', top: 14, width:1.5, height:18,
            background:'#1E3A8A',
            animation:'caret 1.05s steps(1) infinite',
          }}/>
        )}
        {/* recording waveform overlay at the bottom of textarea */}
        {isRec && (
          <div style={{position:'absolute', left:14, right:14, bottom:10, height:18, display:'flex', alignItems:'flex-end', gap:2, pointerEvents:'none'}}>
            {Array.from({length:48}).map((_,i)=>(
              <span key={i} className="wave-bar" style={{
                flex:1,
                background:'#DC2626',
                borderRadius:1,
                opacity:.85,
                animation:`waveAnim 0.9s ease-in-out ${(i%12)*0.05}s infinite alternate`,
              }}/>
            ))}
          </div>
        )}
      </div>

      {/* Row: mic + submit */}
      <div className="flex items-start gap-2 mt-[10px]">
        {/* Mic button + helper label below */}
        <div className="flex flex-col items-center shrink-0" style={{width:60}}>
          <button
            className="grid place-items-center relative shrink-0"
            style={{
              height:44, width:44,
              borderRadius:6,
              border:micBorder,
              background:micBg,
              color:micColor,
              position:'relative',
              transition:'all .15s ease',
              boxShadow: isRec ? '0 0 0 4px rgba(220,38,38,.12)' : 'none',
            }}
            aria-label={isRec ? 'Остановить запись' : 'Голосовой ввод'}>
            {isRec && (
              <span className="absolute" style={{top:5, left:5, width:8, height:8}}>
                <span className="absolute inset-0 rounded-full pulse-ring" style={{background:'#DC2626'}}/>
                <span style={{width:8, height:8, borderRadius:999, background:'#DC2626', display:'block'}} className="pulse-dot"/>
              </span>
            )}
            {isRec ? <I.stop style={{color:'#DC2626'}}/> : <I.mic style={{color:'#94A3B8'}}/>}
          </button>
          <div className="text-[9px] mt-1 leading-tight text-center font-medium" style={{color: isRec ? '#DC2626' : '#94A3B8'}}>
            faster-whisper<br/>RU · KK · EN
          </div>
        </div>

        {/* Submit button */}
        <button
          disabled={submitDisabled}
          className="flex-1 text-white font-semibold inline-flex items-center justify-center gap-2 relative"
          style={{
            height:44, borderRadius:6, fontSize:14,
            background:submitBg,
            cursor: submitDisabled ? 'not-allowed' : 'pointer',
            transition:'all .15s ease',
          }}>
          <I.send/> Сформировать отчёт
        </button>
      </div>
    </div>
  );
}

function StateA({mode='typed'}) {
  const label = mode==='typed' ? 'A1 — текст введён' : 'A2 — голосовой ввод';
  return (
    <div className="screen" data-screen-label={label}>
      <div className="flex h-full">
        <Sidebar/>
        <div className="flex-1 flex flex-col">
          <TopBar/>
          <div className="flex-1 flex justify-center overflow-hidden" style={{background:'#F8FAFC'}}>
            <div style={{maxWidth:560, width:'100%', paddingTop:96}} className="flex flex-col items-center text-center px-6">
              <div className="w-12 h-12 grid place-items-center"><I.doc/></div>
              <h1 className="text-[24px] font-bold mt-4 text-slate-900 tracking-tight">Сформируйте отчёт</h1>
              <p className="text-[15px] mt-2" style={{color:'#64748B'}}>Опишите что хотите увидеть — система построит отчёт автоматически</p>

              <div className="w-full mt-8 text-left">
                <InputBlock mode={mode}/>
              </div>

              <div className="w-full mt-8">
                <div className="text-[10px] font-semibold tracking-[.18em] uppercase mb-3" style={{color:'#94A3B8'}}>или выберите готовый:</div>
                <div className="flex flex-wrap gap-2 justify-center">
                  {PRESETS.map((p,i)=>(
                    <button key={i} className="preset inline-flex items-center gap-1.5 text-[13px]"
                            style={{border:'1px solid #E2E8F0', background:'#fff', borderRadius:20, padding:'8px 14px', color:'#475569', transition:'all .12s ease'}}>
                      <span>{p.e}</span><span>{p.t}</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────  STATE B — CONFIRM MODAL  ───────────────────────────── */
function StateB() {

function SpeedSVG() {
  // x: 0..540, y: 0..150  (0..120 km/h)
  const W=540,H=150, padL=28, padR=12, padT=8, padB=22;
  const yFor = v => padT + (1 - v/120) * (H - padT - padB);
  const xFor = t => padL + t * (W - padL - padR);
  const limitY = yFor(60);

  // generate a wavy speed line with three peaks (spikes at events)
  const points = [];
  const N = 80;
  for (let i=0;i<=N;i++){
    const t = i/N;
    // base wave around 50, three peaks at t=0.1 (08:14, 78), t=0.25 (10:32, 76), t=0.58 (00:36 dip), t=0.78 (09:05), t=0.93 (21:15 +9)
    let s = 48 + Math.sin(t*Math.PI*4)*6 + Math.sin(t*Math.PI*9)*3;
    const gauss = (m,w,h)=>h*Math.exp(-Math.pow((t-m)/w,2));
    s += gauss(0.10,0.025,30); // 78
    s += gauss(0.25,0.022,28); // 76
    s += gauss(0.58,0.030,-30); // low (night)
    s += gauss(0.78,0.025,18); // 68
    s += gauss(0.93,0.022,19); // 69
    s = Math.max(0, Math.min(115, s));
    points.push([xFor(t), yFor(s)]);
  }
  const path = points.map((p,i)=> (i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const fillPath = path + ` L ${xFor(1)} ${yFor(0)} L ${xFor(0)} ${yFor(0)} Z`;

  const events = [
    { t:0.10, label:'08:14 · 78 км/ч', color:'#DC2626', day:'14.05', tooltip:true },
    { t:0.25, label:'10:32 · 76 км/ч', color:'#DC2626', day:'14.05' },
    { t:0.78, label:'09:05 · 68 км/ч', color:'#F59E0B', day:'15.05' },
    { t:0.93, label:'21:15 · 69 км/ч', color:'#F59E0B', day:'15.05' },
  ];

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="100%" preserveAspectRatio="none">
      <defs>
        <linearGradient id="spdFill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="#1E3A8A" stopOpacity=".22"/>
          <stop offset="100%" stopColor="#1E3A8A" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {/* y grid */}
      {[0,30,60,90,120].map(v=>(
        <g key={v}>
          <line x1={padL} x2={W-padR} y1={yFor(v)} y2={yFor(v)} stroke="#F1F5F9"/>
          <text x={padL-6} y={yFor(v)+3} fontSize="9" fill="#94A3B8" textAnchor="end">{v}</text>
        </g>
      ))}
      {/* limit */}
      <line x1={padL} x2={W-padR} y1={limitY} y2={limitY} stroke="#DC2626" strokeWidth="1.2" strokeDasharray="4 3"/>
      <text x={W-padR-2} y={limitY-3} fontSize="9" fill="#DC2626" fontWeight="700" textAnchor="end">60 км/ч</text>
      {/* fill */}
      <path d={fillPath} fill="url(#spdFill)"/>
      {/* line */}
      <path d={path} stroke="#1E3A8A" strokeWidth="2" fill="none" strokeLinejoin="round" strokeLinecap="round"/>
      {/* events */}
      {events.map((e,i)=>{
        const x = xFor(e.t);
        const t = 48 + 30*Math.exp(0); // not used; we sample
        // pull approximate y by re-running formula
        let s = 48 + Math.sin(e.t*Math.PI*4)*6 + Math.sin(e.t*Math.PI*9)*3;
        const gauss = (m,w,h)=>h*Math.exp(-Math.pow((e.t-m)/w,2));
        s += gauss(0.10,0.025,30) + gauss(0.25,0.022,28) + gauss(0.58,0.030,-30) + gauss(0.78,0.025,18) + gauss(0.93,0.022,19);
        const y = yFor(Math.max(0,Math.min(115,s)));
        return (
          <g key={i}>
            <line x1={x} x2={x} y1={y} y2={H-padB} stroke={e.color} strokeWidth="1" strokeDasharray="2 2" opacity=".7"/>
            <circle cx={x} cy={y} r="4" fill={e.color} stroke="#fff" strokeWidth="1.5"/>
          </g>
        );
      })}
      {/* tooltip on first spike */}
      {(() => {
        const e = events[0];
        const x = xFor(e.t);
        let s = 48 + Math.sin(e.t*Math.PI*4)*6 + Math.sin(e.t*Math.PI*9)*3;
        const gauss = (m,w,h)=>h*Math.exp(-Math.pow((e.t-m)/w,2));
        s += gauss(0.10,0.025,30) + gauss(0.25,0.022,28) + gauss(0.58,0.030,-30) + gauss(0.78,0.025,18) + gauss(0.93,0.022,19);
        const y = yFor(s);
        const tw=128, th=32;
        const tx = x + 8, ty = y - th - 6;
        return (
          <g>
            <rect x={tx} y={ty} width={tw} height={th} rx="6" fill="#0F172A"/>
            <text x={tx+8} y={ty+13} fontSize="9.5" fill="#fff" fontWeight="700">14.05 · 08:14 · 78 км/ч</text>
            <text x={tx+8} y={ty+25} fontSize="9" fill="#FCA5A5">+18 км/ч превышение</text>
          </g>
        );
      })()}
      {/* x labels */}
      <text x={xFor(0)} y={H-6} fontSize="9.5" fill="#64748B" fontWeight="600">14.05</text>
      <text x={xFor(0.5)} y={H-6} fontSize="9.5" fill="#64748B" fontWeight="600" textAnchor="middle">15.05</text>
      <text x={xFor(1)} y={H-6} fontSize="9.5" fill="#64748B" fontWeight="600" textAnchor="end">16.05</text>
    </svg>
  );
}

function ByDayChart() {
  const days = [
    { d:'14.05', v:5, t:4 },
    { d:'15.05', v:4, t:5 },
    { d:'16.05', v:3, t:2 },
  ];
  const maxStack = 12;
  const W=480, H=160, padL=32, padR=12, padT=18, padB=30;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const bandW = innerW / days.length;
  const barW = 56;
  const yFor = v => padT + (1 - v/maxStack) * innerH;
  return (
    <div style={{marginBottom:14}}>
      <div className="flex items-center justify-between mb-2">
        <div className="text-[11px] font-semibold uppercase tracking-wider" style={{color:'#64748B'}}>Нарушения по дням</div>
        <div className="text-[11px] inline-flex items-center gap-3" style={{color:'#64748B'}}>
          <span className="inline-flex items-center gap-1"><span style={{width:10,height:10,background:'#0EA5E9',borderRadius:2}}/>Телематика</span>
          <span className="inline-flex items-center gap-1"><span style={{width:10,height:10,background:'#7C3AED',borderRadius:2}}/>ВА</span>
        </div>
      </div>
      <div style={{height:160, border:'1px solid #E2E8F0', borderRadius:8, padding:'4px 4px 0', background:'#fff'}}>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="100%" preserveAspectRatio="none">
          {/* y grid */}
          {[0,3,6,9,12].map(v=>(
            <g key={v}>
              <line x1={padL} x2={W-padR} y1={yFor(v)} y2={yFor(v)} stroke="#F1F5F9"/>
              <text x={padL-6} y={yFor(v)+3} fontSize="9" fill="#94A3B8" textAnchor="end">{v}</text>
            </g>
          ))}
          {days.map((day,i)=>{
            const cx = padL + bandW*(i+0.5);
            const x  = cx - barW/2;
            const total = day.v + day.t;
            const yTel = yFor(day.t);
            const hTel = yFor(0) - yFor(day.t);
            const yVA  = yFor(total);
            const hVA  = yFor(day.t) - yFor(total);
            const isHover = i===0;
            return (
              <g key={day.d}>
                {/* telematics bottom */}
                <rect x={x} y={yTel} width={barW} height={hTel} fill="#0EA5E9" rx="2"/>
                {/* video top */}
                <rect x={x} y={yVA} width={barW} height={hVA} fill="#7C3AED" rx="2"/>
                {/* total label */}
                <text x={cx} y={yVA-4} fontSize="11" fontWeight="800" fill="#0F172A" textAnchor="middle">{total}</text>
                {/* split inside bars */}
                <text x={cx} y={yTel + hTel/2 + 3} fontSize="9" fontWeight="700" fill="#fff" textAnchor="middle">{day.t}</text>
                <text x={cx} y={yVA + hVA/2 + 3} fontSize="9" fontWeight="700" fill="#fff" textAnchor="middle">{day.v}</text>
                {/* x label */}
                <text x={cx} y={H-12} fontSize="10" fontWeight="600" fill="#64748B" textAnchor="middle">{day.d}</text>
                {/* tooltip on first */}
                {isHover && (
                  <g>
                    <rect x={cx-66} y={yVA-46} width="132" height="36" rx="6" fill="#0F172A"/>
                    <text x={cx-58} y={yVA-32} fontSize="10" fill="#fff" fontWeight="700">14.05 · всего {total}</text>
                    <text x={cx-58} y={yVA-20} fontSize="9" fill="#A78BFA">ВА: {day.v}</text>
                    <text x={cx-22} y={yVA-20} fontSize="9" fill="#67E8F9">Телематика: {day.t}</text>
                  </g>
                )}
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

      <path d="M 70 -10 L 120 60 L 200 100 L 320 130 L 420 180" stroke="#CBD5E1" strokeWidth=".6" fill="none"/>

      <path d="M 250 -10 L 280 90 L 360 150" stroke="#CBD5E1" strokeWidth=".5" fill="none"/>

      {items.map((p,i)=>{
        if (p.c === 'cluster') {
          return (
            <g key={i}>
              <circle cx={p.x} cy={p.y} r="18" fill={p.sev} opacity=".15"/>
              <circle cx={p.x} cy={p.y} r="12" fill={p.sev}/>
              <text x={p.x} y={p.y+4} fontSize="11" fontWeight="800" fill="#fff" textAnchor="middle">{p.count}</text>
            </g>
          );
        }
        return (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="6" fill={p.c} opacity=".22"/>
            <circle cx={p.x} cy={p.y} r="3.5" fill={p.c} stroke="#fff" strokeWidth="1"/>
          </g>
        );
      })}

      {/* north arrow */}
      <g transform="translate(450 150)">
        <circle r="12" fill="#fff" stroke="#CBD5E1" strokeWidth=".8"/>

        <text y="-9" fontSize="7" fill="#64748B" textAnchor="middle" fontWeight="700">N</text>
      </g>

  );
}

    { d:'16.05', t:'07:22', name:'Резкое перестроение', sev:'high', src:'telematics' },

        <span className="text-[11px]" style={{color:'#CBD5E1'}}>·</span>
        <span className="text-[11px] font-semibold" style={{color:'#1E3A8A'}}>#{d.id}</span>
      </div>

      {/* header card */}
      <div style={{background:'#F8FAFC', border:'1px solid #E2E8F0', borderRadius:8, padding:14}}>

               style={{background:'linear-gradient(135deg,#1E40AF,#3B82F6)'}}>{initials}</div>
          <div className="flex-1 min-w-0">

          </div>
          <div className="text-right shrink-0">

        <MiniKpi n={d.video} label="ВА 📹" color="#7C3AED"/>

        <div style={{background:'#fff', border:'1px solid #E2E8F0', borderRadius:6, padding:'8px 10px'}}>

          {recentViolations.map((v,i)=>{

/* ─ vehicle mini-dashboard ─ */
function VehicleMiniDash({v}) {
  const rc = scoreColor(v.risk);
  const cams = [
    { id:'CAM-01', kind:'ADAS · фронт', state: v.cams.state==='offline' || v.id===3 ? 'ok' : 'ok' },
    { id:'CAM-02', kind:'DMS · салон',  state: v.id===5 ? 'partial' : 'ok' },
    { id:'CAM-03', kind:'CH3 · кузов',  state: v.id===3 ? 'offline' : v.id===1 ? 'partial' : 'ok' },
  ];
  // Drivers on the vehicle during the period
  const driversOn = v.id===1 ? [
    { name:'Иванов А.П.',  primary:true,  rides:4, dates:'14–16.05' },
    { name:'Козлов И.А.',  primary:false, rides:1, dates:'14.05'    },
  ] : v.id===2 ? [
    { name:'Петров Д.С.',  primary:true,  rides:6, dates:'14–16.05' },
  ] : v.id===3 ? [
    { name:'Сидоров В.Н.', primary:true,  rides:3, dates:'14–16.05' },
    { name:'Степанов Д.В.',primary:false, rides:1, dates:'16.05'    },
  ] : v.id===4 ? [
    { name:'Козлов И.А.',  primary:true,  rides:5, dates:'14–16.05' },
  ] : [
    { name:'Степанов Д.В.',primary:true,  rides:3, dates:'14–16.05' },
    { name:'Сидоров В.Н.', primary:false, rides:1, dates:'15.05'    },
  ];
  const recent = v.id===1 ? [
    { d:'16.05', t:'13:40', name:'Отвлечение внимания', sev:'high',   src:'video-dms' },

  ] : v.id===2 ? [
    { d:'15.05', t:'18:11', name:'Использование телефона', sev:'severe', src:'video-dms' },
    { d:'14.05', t:'04:08', name:'Сонливость',             sev:'severe', src:'video-dms' },
    { d:'16.05', t:'07:22', name:'Резкое перестроение',    sev:'high',   src:'telematics' },
  ] : v.id===3 ? [
    { d:'15.05', t:'11:30', name:'Превышение +14 км/ч',    sev:'high', src:'telematics' },
    { d:'14.05', t:'16:42', name:'Резкое торможение',       sev:'high', src:'telematics' },
    { d:'14.05', t:'10:15', name:'Отвлечение внимания',     sev:'high', src:'video-dms' },
  ] : v.id===4 ? [
    { d:'16.05', t:'09:18', name:'Превышение +9 км/ч',     sev:'medium', src:'telematics' },
    { d:'15.05', t:'14:33', name:'Резкое ускорение',        sev:'high',   src:'telematics' },
    { d:'14.05', t:'19:50', name:'Резкое торможение',       sev:'high',   src:'telematics' },
  ] : [
    { d:'15.05', t:'08:12', name:'Превышение +8 км/ч',     sev:'medium', src:'telematics' },
    { d:'14.05', t:'13:24', name:'Ремень безопасности',     sev:'high',   src:'video' },
    { d:'14.05', t:'06:45', name:'Резкое торможение',       sev:'high',   src:'telematics' },
  ];
  const rides = v.id===1 ? 4 : v.id===2 ? 6 : v.id===3 ? 4 : v.id===4 ? 5 : 4;
  const time  = v.id===1 ? '9ч 42м' : v.id===2 ? '12ч 18м' : v.id===3 ? '8ч 54м' : v.id===4 ? '11ч 06м' : '8ч 30м';

  return (

      <div className="flex items-center gap-2 mb-2">
        <span className="text-[11px] uppercase font-semibold tracking-wider" style={{color:'#94A3B8'}}>Мини-дашборд ТС</span>
        <span className="text-[11px]" style={{color:'#CBD5E1'}}>·</span>
        <span className="text-[11px] font-semibold" style={{color:'#1E3A8A'}}>#{v.id}</span>
      </div>

      {/* header card */}
      <div style={{background:'#F8FAFC', border:'1px solid #E2E8F0', borderRadius:8, padding:'10px 12px'}}>
        <div className="flex items-center gap-2.5">
          <div className="rounded-lg grid place-items-center text-[18px] shrink-0"
               style={{width:36, height:36, background:'#fff', border:'1px solid #E2E8F0'}}>🚛</div>
          <div className="flex-1 min-w-0">
            <div className="text-[15px] font-bold text-slate-900 font-mono leading-tight">{v.plate}</div>
            <div className="text-[12px]" style={{color:'#64748B'}}>{v.model}</div>

      {/* Camera status — compact one-liners */}

        <div className="flex items-end justify-between mb-1">
          <div className="text-[11px] font-semibold uppercase tracking-wider" style={{color:'#64748B'}}>Состояние камер</div>

            <div className="text-[10px] italic" style={{color:'#94A3B8'}}>{v.cams.detail}</div>

            return (
              <div key={c.id} className="flex items-center gap-2"

              {dr.primary && <span className="text-[9px] font-bold px-1 py-0.5 rounded" style={{background:'#EFF6FF', color:'#1E3A8A'}}>ОСНОВНОЙ</span>}
              <span className="ml-auto text-[11px]" style={{color:'#64748B'}}>{dr.rides} {dr.rides===1?'рейс':'рейсов'} · {dr.dates}</span>
            </div>
          ))}
        </div>
      </div>

      {/* KPI row */}
      <div className="grid grid-cols-4 gap-1.5 mt-2.5">
        <MiniKpi n={v.count} label="Наруш."  color="#1E3A8A"/>
        <MiniKpi n={v.km}    label="км"      color="#0F172A"/>
        <MiniKpi n={rides}   label="Рейсов"  color="#0F172A"/>
        <MiniKpi n={time}    label="В рейсе" color="#0F172A"/>
      </div>

      {/* 3 last violations */}
      <div className="mt-2.5">
        <div className="text-[11px] font-semibold uppercase tracking-wider mb-1" style={{color:'#64748B'}}>3 последних нарушения</div>
        <div style={{background:'#fff', border:'1px solid #E2E8F0', borderRadius:8, overflow:'hidden'}}>
          {recent.map((vi,i)=>{
            const sev = SEV[vi.sev];
            const src = SRC[vi.src];
            const isLast = i === recent.length-1;
            return (
              <div key={i} className="row flex items-center gap-2"
                   style={{padding:'6px 10px', borderBottom: isLast ? 'none' : '1px solid #F1F5F9', borderLeft: vi.sev==='severe' ? '3px solid #DC2626' : '3px solid transparent'}}>
                <div className="shrink-0" style={{width:46}}>
                  <div className="text-[11px] font-bold text-slate-900 leading-tight">{vi.d}</div>
                  <div className="text-[10px]" style={{color:'#64748B'}}>{vi.t}</div>
                </div>
                <div className="flex-1 min-w-0 text-[12px] font-semibold text-slate-900 truncate">{vi.name}</div>
                <span className="inline-flex items-center text-[10px] font-semibold px-1.5 py-0.5 rounded shrink-0"
                      style={{background:src.bg, color:src.fg}}>{src.icon}</span>
                <span className="inline-flex items-center gap-1 text-[10px] font-semibold px-1.5 py-0.5 rounded shrink-0"
                      style={{background:sev.bg, color:sev.fg}}>
                  <span className="w-1.5 h-1.5 rounded-full" style={{background:sev.dot}}/> {sev.label}
                </span>
              </div>
            );
          })}
        </div>
      </div>

      <button className="primary-btn inline-flex items-center justify-center gap-2 text-white text-[12px] font-semibold w-full mt-2.5"
              style={{height:36, borderRadius:8}}>
        Открыть историю ТС {v.plate} <I.arrowR/>
      </button>
    </div>

}

function MiniKpi({n, label, color, bg}) {
  return (
    <div style={{background:bg||'#fff', border:'1px solid '+(bg?'#FECACA':'#E2E8F0'), borderRadius:6, padding:'6px 8px'}}>
      <div className="text-[17px] font-extrabold leading-none" style={{color}}>{n}</div>
      <div className="text-[9px] font-semibold uppercase tracking-wider mt-1" style={{color:'#64748B'}}>{label}</div>
    </div>
  );
}
